<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NUS Mathematics Interactive Course Map</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.7.4/dist/dagre.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        background: #fff;
        overflow: hidden;
      }
      #cy {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .info-card {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border: 1px solid #000;
        width: 350px;
        pointer-events: none;
        border-radius: 8px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        border-bottom: 1px solid #000;
        padding-bottom: 5px;
        text-transform: uppercase;
      }
      #details {
        font-size: 16px;
        margin-top: 10px;
        line-height: 1.5;
        pointer-events: auto;
        color: #333;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #000;
        font-weight: bold;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="loading">Fetching data...</div>

    <div class="info-card">
      <h1>NUS Mathematics COURSES</h1>
      <div id="details">
        Click on a course node to highlight its prerequisite path.
      </div>
    </div>

    <div id="cy"></div>

    <script>
      /**
       * Calculates current Academic Year based on August start.
       */
      function getTargetAY() {
        const now = new Date(); // Gets current date/time
        const year = now.getFullYear(); // Extract year
        const month = now.getMonth(); // Extract month, where January = 0, February = 1, ...
        return month < 7 ? `${year - 1}-${year}` : `${year}-${year + 1}`;
      }

      /**
       * Fetches module data.
       */
      async function fetchModuleData(ay) {
        try {
          const response = await fetch(
            `https://api.nusmods.com/v2/${ay}/moduleInformation.json`,
          ); // Fetch JSON data from NUSMods
          if (!response.ok) throw new Error("AY not available"); // If request failed, throw an error
          return await response.json();
        } catch (e) {
          const prevYear = parseInt(ay.split("-")[0]) - 1; // For example, "2025-2026" becomes 2024
          const prevAY = `${prevYear}-${prevYear + 1}`; // Construct previous AY
          const response = await fetch(
            `https://api.nusmods.com/v2/${prevAY}/moduleInformation.json`,
          ); // Retry fetch using previous AY
          return await response.json();
        }
      }

      /**
       * Main application logic.
       * Fetches data, filters relevant modules, and initialises the interactive graph.
       */
      async function initGraph() {
        const AY = getTargetAY();

        // Modules that are not part of core mathematics major dependency chain
        // A Set is used instead of array for fast membership checking
        const excludedModules = new Set([
          "MA1301",
          "MA1301X",
          "MA1312",
          "MA1505",
          "MA1508E",
          "MA1511",
          "MA1513",
          "MA1521",
          "MA1522",
          "MA2288",
          "MA2288R",
          "MA2289",
          "MA2289R",
        ]);

        try {
          const modules = await fetchModuleData(AY); // Downloads all module information, for ALL NUS modules, not only mathematics, filter later
          document.getElementById("loading").style.display = "none"; // Hide loading indicator

          // Filter for Math modules (MA prefix) that are currently offered
          const offeredMath = modules.filter(
            (m) =>
              m.moduleCode.startsWith("MA") &&
              !excludedModules.has(m.moduleCode) &&
              m.semesterData &&
              m.semesterData.length > 0,
          );

          const validCodes = new Set(offeredMath.map((m) => m.moduleCode)); // Creates a set containing all filtered module codes
          const connectedNodes = new Set(); // Create set of connected nodes, which tracks modules that actually participate in prerequisite relationships

          // Exclude nodes without connections
          offeredMath.forEach((mod) => 
          // Loop through every filtered math module
          {
            const prereqs = mod.prerequisite // Extract prerequisites
              ? mod.prerequisite.match(/[A-Z]{2,3}\d{4}[A-Z]{0,1}/g) || [] : []; 
              // This regex extracts module codes from freeform text
              // [A-Z]{2,3} matches 2 or 3 uppercase letters
              // \d{4} matches exactly 4 digits
              // [A-Z]{0,1} matches an optional trailing letter (variant of module)
              // /g performs a global match, i.e., find all matches
              // If no matches found, return empty array instead of null
              // If no prerequisite, return empty array

            prereqs.forEach((p) => 
            // Loop through extracted prerequisite module codes
            {
              if (validCodes.has(p)) {
                connectedNodes.add(p);
                connectedNodes.add(mod.moduleCode);
              }
            });
          });

          // Prepare elements for Cytoscape
          // This array will contain node definitions and edge definitions
          const elements = [];
          offeredMath
            .filter((m) => connectedNodes.has(m.moduleCode)) // Remove isolated modules, only keep modules participating in at least one edge
            .forEach((mod) => {
              const code = mod.moduleCode;

              // Compute hierarchy level: Extract level from course code (e.g., MA1xxx = Level 1)
              // MA2001/2002 are foundational and forced to Level 1
              let level =
                code === "MA2001" || code === "MA2002"
                  ? 1
                  : parseInt(code.match(/\d/)[0]); // Regex to extract first digit
              
              // Add node definitions to elements array
              elements.push({
                // Cytoscape stores node metadata inside data
                data: {
                  id: code, // node id
                  label: code, // node label - displayed text on node
                  title: mod.title, // course title, stored for info card
                  desc: mod.description || "", // module description, fallbacks to empty string if missing
                  level: level, // stores hierarchy level
                },
              });

              // Build edges using prerequisites
              const prereqs = mod.prerequisite
                ? mod.prerequisite.match(/[A-Z]{2,3}\d{4}[A-Z]{0,1}/g) || []
                : [];
              prereqs.forEach((p) => 
              // Loop through prerequisites
              {
                if (validCodes.has(p)) {
                  elements.push({ data: { source: p, target: code } }); // Push edge object (a directed edge)
                }
              });
            });
          
          // Create a Cytoscape instance, which corresponds to a graph
          const cy = cytoscape({
            container: document.getElementById("cy"), // container to render in
            elements: elements,
            style: [
              { // style nodes
                selector: "node",
                style: {
                  label: "data(label)",
                  "background-color": "#fff",
                  color: "#000",
                  "border-width": 2,
                  "border-color": "#000",
                  "text-valign": "center",
                  "text-halign": "center",
                  "font-size": "48px",
                  width: "220px",
                  height: "220px",
                  shape: "ellipse",
                  "font-family": '"Helvetica Neue", Arial, sans-serif',
                  "font-weight": "normal",
                },
              },
              { // style edges
                selector: "edge",
                style: {
                  width: 2,
                  "line-color": "#000",
                  "target-arrow-color": "#000",
                  "target-arrow-shape": "triangle",
                  "curve-style": "straight",
                  "arrow-scale": 1.8,
                  opacity: 1,
                },
              },
            ],
          });

          // Get a new layout, which can be used to algorithmically position the nodes in the graph
          // In this case, we specify logic for a hierarchical layout
          const layout = cy.layout({
            name: "dagre", // Dagre layout for DAGs and trees, it organises the graph in a hierarchy
            rankDir: "TB", // Top -> Bottom, so hierarchy flows downward
            animate: false, // Layout appears instantly, no transition animation
            padding: 80,
            nodeSep: 150, // Horizontal spacing between nodes
            rankSep: 400, // Vertical spacing between hierarchy levels

            // Custom positioning - this function runs after Dagre finishes computing layout
            stop: function () {
              const maxInRow = 5; // max number of nodes in each row
              const levelCounts = {}; // tracks number of nodes placed at each level

              cy.nodes().forEach((node) => 
              // Loop through every node in graph
              {
                const level = node.data("level"); // Retrieves previously stored level value
                if (!levelCounts[level]) levelCounts[level] = 0;

                const count = levelCounts[level];
                const subLevel = Math.floor(count / maxInRow);

                // Manual Y-positioning to ensure level-based stratification
                node.position("y", level * 900 + subLevel * 300);
                levelCounts[level]++;
              });
              cy.fit(100); // Fit graph to viewport
            },
          });

          layout.run();

          // Node Tap Handler: Highlight prerequisite path and show course details
          // Event listener (when a node is clicked/tapped, run this function)
          cy.on("tap", "node", function (evt) {
            const node = evt.target; // Get the node that was clicked
            const fullDesc = node.data("desc"); // Retrieve module description
            const maxDescLength = 300; // Maximum length of description

            // Truncate description
            let displayDesc = fullDesc;
            if (fullDesc.length > maxDescLength) { // If description is too long, truncate it
              displayDesc =
                fullDesc.substring(
                  0,
                  fullDesc.lastIndexOf(" ", maxDescLength), // Searches backward from to find the nearest space - this avoids words truncated into half
                ) + "...";
            }

            // Update info card
            document.getElementById("details").innerHTML = `
                <strong style="font-size:1.3em;">${node.data("id")}</strong><br>
                <em style="color:#444;">${node.data("title")}</em><br><br>
                ${displayDesc}
            `;
            
            // Fade entire graph to focus on prerequisite chain, and highlight predecessor nodes
            cy.elements().style("opacity", 0.1);
            node.predecessors().style("opacity", 1);
            node.style("opacity", 1);
          });
          
          // Background Tap Handler - event listener that listens for ANY tap
          // Reset view on background tap
          cy.on("tap", function (e) {
            if (e.target === cy) {
              cy.elements().style("opacity", 1); // Reset everything back to fully visible
              document.getElementById("details").innerHTML =
                "Click on a course node to highlight its prerequisite path."; // Reset info card
            }
          });
        } catch (e) {
          document.getElementById("loading").innerText = "Connection error.";
          console.error(e);
        }
      }
      
      // Start the application
      initGraph();
    </script>
  </body>
</html>
